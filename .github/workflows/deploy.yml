name: Deploy Maestro

on:
  push:
    branches: [main]

concurrency:
  group: deploy-maestro
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/joaovenera/maestro

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api
            context: api
            dockerfile: api/Dockerfile.api
          - service: worker
            context: api
            dockerfile: api/Dockerfile.worker
          - service: web
            context: web
            dockerfile: web/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            ${{ matrix.service == 'web' && 'API_URL=http://maestro-api:3001' || '' }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Pull and redeploy via Coolify
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,COOLIFY_API_KEY
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u joaovenera --password-stdin
            docker pull ghcr.io/joaovenera/maestro-api:latest
            docker pull ghcr.io/joaovenera/maestro-worker:latest
            docker pull ghcr.io/joaovenera/maestro-web:latest

            # Recriar apenas os containers da aplicação (projeto Coolify vtp9khsw33hp1a3ph6x3swi7)
            docker run --rm \
              -v /data/coolify/services/vtp9khsw33hp1a3ph6x3swi7:/compose:ro \
              -v /var/run/docker.sock:/var/run/docker.sock \
              docker:cli \
              docker compose \
              -p vtp9khsw33hp1a3ph6x3swi7 \
              -f /compose/docker-compose.yml \
              up -d --force-recreate \
              maestro-api maestro-worker maestro-web
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          COOLIFY_API_KEY: ${{ secrets.COOLIFY_API_KEY }}

      - name: Health check
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://painel.venerahost.meatende.cloud/dashboard)
          echo "Health: $STATUS"
          [ "$STATUS" = "200" ] && echo "OK" || (echo "FAILED" && exit 1)
