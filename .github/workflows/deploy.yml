name: Deploy Maestro

on:
  push:
    branches: [main]

concurrency:
  group: deploy-maestro
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/joaovenera/maestro

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api
            context: api
            dockerfile: api/Dockerfile.api
          - service: worker
            context: api
            dockerfile: api/Dockerfile.worker
          - service: web
            context: web
            dockerfile: web/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            ${{ matrix.service == 'web' && 'API_URL=http://maestro-api:3001' || '' }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Pull new images on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          # GHCR_TOKEN passado via envs — disponível como $GHCR_TOKEN no script
          envs: GHCR_TOKEN
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u joaovenera --password-stdin
            docker pull ghcr.io/joaovenera/maestro-api:latest
            docker pull ghcr.io/joaovenera/maestro-worker:latest
            docker pull ghcr.io/joaovenera/maestro-web:latest
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - name: Restart Maestro service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/venerahost/maestro
            docker compose -f docker-compose.coolify.yml \
              --env-file .env \
              --project-name maestro-prod \
              up -d --pull never --force-recreate \
              maestro-api maestro-worker maestro-web

      - name: Health check
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://painel.venerahost.meatende.cloud/health)
          echo "Health: $STATUS"
          [ "$STATUS" = "200" ] && echo "OK" || (echo "FAILED" && exit 1)
